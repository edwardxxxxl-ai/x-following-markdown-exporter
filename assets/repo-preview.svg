    <rect x="300" y="187" width="1000" height="559" rx="28" fill="#FFF9F1" fill-opacity="0.88"/>
    <rect x="300.5" y="187.5" width="999" height="558" rx="27.5" stroke="#1D1D1F" stroke-opacity="0.12"/>

