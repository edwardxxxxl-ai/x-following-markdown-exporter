    <rect x="352" y="282" width="576" height="68" rx="18" fill="white" fill-opacity="0.82" stroke="#1D1D1F" stroke-opacity="0.12"/>
    <text x="378" y="325" fill="#5F5C57" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="30">@ odysseyml</text>

    <rect x="952" y="282" width="296" height="68" rx="16" fill="#A53E20"/>
    <text x="1007" y="325" fill="#FFF9F2" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="700">Export following list</text>

    <text x="352" y="406" fill="#5F5C57" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="20">Requirements: Arc open, X logged in, local export only.</text>

    <text x="352" y="492" fill="#7C7872" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="18" letter-spacing="3">OUTPUT</text>
